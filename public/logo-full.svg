<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DFF3F0"/>
      <stop offset="45%" stop-color="#F7FCFB"/>
      <stop offset="100%" stop-color="#CDEBE6"/>
    </linearGradient>
    <linearGradient id="cork" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C89A6B"/>
      <stop offset="100%" stop-color="#A9784A"/>
    </linearGradient>
    <radialGradient id="pill" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#F3EFE6"/>
      <stop offset="100%" stop-color="#E2DCCB"/>
    </radialGradient>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="960" height="340" fill="#FFFFFF"/>

  <!-- ============ EMBLEM : vials & globules ============ -->
  <g transform="translate(70,30)">

    <!-- Second vial (capped), tilted, globules contained -->
    <g transform="translate(150,58) rotate(-118)">
      <rect x="-16" y="0" width="32" height="98" rx="7" fill="url(#glass)" stroke="#0E7C7B" stroke-width="5"/>
      <rect x="-18" y="-22" width="36" height="20" rx="4" fill="#F5F5F5" stroke="#0E7C7B" stroke-width="4"/>
      <line x1="-11" y1="-17" x2="-11" y2="-5" stroke="#0E7C7B" stroke-width="2" stroke-linecap="round"/>
      <line x1="-3" y1="-17" x2="-3" y2="-5" stroke="#0E7C7B" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="-17" x2="5" y2="-5" stroke="#0E7C7B" stroke-width="2" stroke-linecap="round"/>
      <g stroke="#D8D2C0" stroke-width="1.5" fill="url(#pill)">
        <circle cx="-6" cy="84" r="7"/>
        <circle cx="7" cy="86" r="7"/>
        <circle cx="0" cy="70" r="7"/>
        <circle cx="-6" cy="56" r="7"/>
        <circle cx="7" cy="58" r="7"/>
      </g>
    </g>

    <!-- Main upright vial: thicker cylinder with white ribbed cap -->
    <g transform="translate(74,80)">
      <!-- body -->
      <rect x="-28" y="10" width="56" height="178" rx="8" fill="url(#glass)" stroke="#0E7C7B" stroke-width="6"/>
      <!-- white ribbed cap -->
      <rect x="-31" y="-20" width="62" height="26" rx="5" fill="#F5F5F5" stroke="#0E7C7B" stroke-width="5"/>
      <line x1="-18" y1="-13" x2="-18" y2="1" stroke="#0E7C7B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-9" y1="-13" x2="-9" y2="1" stroke="#0E7C7B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="-13" x2="0" y2="1" stroke="#0E7C7B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="9" y1="-13" x2="9" y2="1" stroke="#0E7C7B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="18" y1="-13" x2="18" y2="1" stroke="#0E7C7B" stroke-width="2.5" stroke-linecap="round"/>
      <!-- glass shine -->
      <line x1="-16" y1="40" x2="-16" y2="96" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <!-- globules stacked inside (contained) -->
      <g stroke="#D8D2C0" stroke-width="1.5" fill="url(#pill)">
        <circle cx="-12" cy="180" r="11"/>
        <circle cx="10" cy="182" r="11"/>
        <circle cx="-12" cy="160" r="11"/>
        <circle cx="10" cy="162" r="11"/>
        <circle cx="-1" cy="142" r="11"/>
        <circle cx="-12" cy="123" r="11"/>
        <circle cx="10" cy="125" r="11"/>
        <circle cx="-1" cy="105" r="11"/>
      </g>
    </g>

    <!-- Ground line -->
    <line x1="10" y1="288" x2="185" y2="288" stroke="#CDEBE6" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- ============ WORDMARK ============ -->
  <g fill="#0E4F4E">
    <text x="330" y="155" font-size="54" font-weight="bold" letter-spacing="1">Dr. Sheetal&#8217;s</text>
    <text x="332" y="212" font-size="35" letter-spacing="6" fill="#17A398">HOMOEOPATHY</text>
    <text x="332" y="252" font-size="23" letter-spacing="12" fill="#6BBF59">C L I N I C</text>
  </g>
  <line x1="332" y1="230" x2="580" y2="230" stroke="#C89A6B" stroke-width="2.5"/>
</svg>
